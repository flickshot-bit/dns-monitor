<!DOCTYPE html>
<html lang="en" data-theme="night">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DNS Monitor Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.6.0/dist/full.min.css" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="bg-base-300 min-h-screen p-6">

    <div class="flex items-center justify-between mb-6">
        <div>
            <h1 class="text-2xl font-bold">● DNS Monitor Dashboard</h1>
            <p class="text-sm opacity-40">Last Updated: <span id="clock"></span></p>
        </div>
        <div class="badge badge-success gap-2 p-3 text-sm">● LIVE</div>
    </div>

    <div class="grid grid-cols-4 gap-4 mb-6">
        <div class="bg-base-100 rounded-xl p-5 border-l-4 border-cyan-400">
            <div class="text-3xl mb-1">📊</div>
            <div class="text-3xl font-bold text-cyan-400" id="total-checks">—</div>
            <div class="text-xs opacity-40 uppercase mt-1">Total Checks</div>
        </div>
        <div class="bg-base-100 rounded-xl p-5 border-l-4 border-red-400">
            <div class="text-3xl mb-1">🚨</div>
            <div class="text-3xl font-bold text-red-400" id="total-changes">—</div>
            <div class="text-xs opacity-40 uppercase mt-1">Total Changes</div>
        </div>
        <div class="bg-base-100 rounded-xl p-5 border-l-4 border-blue-400">
            <div class="text-3xl mb-1">🌍</div>
            <div class="text-3xl font-bold text-blue-400">4</div>
            <div class="text-xs opacity-40 uppercase mt-1">Domains Monitored</div>
        </div>
        <div class="bg-base-100 rounded-xl p-5 border-l-4 border-gray-400">
            <div class="text-3xl mb-1">⏱️</div>
            <div class="text-3xl font-bold">99.9%</div>
            <div class="text-xs opacity-40 uppercase mt-1">Uptime SLO</div>
        </div>
    </div>

    <div class="grid grid-cols-2 gap-4 mb-6">
        <div class="bg-base-100 rounded-xl p-4">
            <p class="text-xs opacity-40 uppercase mb-3">■ DNS Changes Over Time</p>
            <div style="height:220px; position:relative;">
                <canvas id="changesChart"></canvas>
            </div>
        </div>
        <div class="bg-base-100 rounded-xl p-4">
            <p class="text-xs opacity-40 uppercase mb-3">● Record Types Distribution</p>
            <div style="height:220px; position:relative;">
                <canvas id="typesChart"></canvas>
            </div>
        </div>
    </div>

    <div class="grid grid-cols-2 gap-4">
        <div class="bg-base-100 rounded-xl p-4">
            <div class="flex justify-between items-center mb-3">
                <p class="text-xs text-red-400 uppercase font-bold">■ Recent Changes</p>
                <span class="badge badge-error badge-sm" id="changes-count">0</span>
            </div>
            <table class="table table-xs w-full">
                <thead>
                    <tr class="text-xs opacity-30 uppercase">
                        <th>Domain</th><th>Type</th><th>New Value</th><th>Time</th>
                    </tr>
                </thead>
                <tbody id="changes-body">
                    <tr><td colspan="4" class="text-center opacity-30 py-4">No changes yet</td></tr>
                </tbody>
            </table>
        </div>
        <div class="bg-base-100 rounded-xl p-4">
            <div class="flex justify-between items-center mb-3">
                <p class="text-xs opacity-40 uppercase font-bold">■ Latest Records</p>
                <span class="badge badge-info badge-sm" id="records-count">0</span>
            </div>
            <table class="table table-xs w-full">
                <thead>
                    <tr class="text-xs opacity-30 uppercase">
                        <th>Domain</th><th>Type</th><th>Value</th><th>Time</th>
                    </tr>
                </thead>
                <tbody id="records-body">
                    <tr><td colspan="4" class="text-center opacity-30 py-4">Loading...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
